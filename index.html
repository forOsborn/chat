<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>护理差错告知训练助手</title>

  <script src="https://lf-cdn.coze.cn/obj/unpkg/flow-platform/chat-app-sdk/1.2.0-beta.20/libs/cn/index.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #f5f6f8;
      overflow: hidden;
    }

    /* 隐藏可能出现的文字输入框 */
    textarea,
    input[type="text"],
    input:not([type]),
    [contenteditable="true"] {
      display: none !important;
      visibility: hidden !important;
      pointer-events: none !important;
    }
  </style>
</head>
<body>
  <script>
    new CozeWebSDK.WebChatClient({
      config: {
        bot_id: '7612150713271320619',
      },
      componentProps: {
        title: '基于伦理的AI沟通培训助手9.1.0',
      },
      auth: {
        type: 'token',
        token: 'pat_M8prcyVFPhY8Vpxlj8k9AhNl9oHggijSAl9UNePaCVDkW7Ry3huLsJMV6BR3SNfR',
        onRefreshToken: async function () {
          return 'pat_M8prcyVFPhY8Vpxlj8k9AhNl9oHggijSAl9UNePaCVDkW7Ry3huLsJMV6BR3SNfR';
        }
      }
    });

    function applyVoiceOnlyUI() {
      // 1. 隐藏可能出现的文字输入框
      document.querySelectorAll('textarea, input[type="text"], input:not([type]), [contenteditable="true"]').forEach(el => {
        el.style.display = 'none';
        el.style.visibility = 'hidden';
        el.style.pointerEvents = 'none';
      });

      // 2. 隐藏右下角切换图标
      const iconButtons = document.querySelectorAll('button.coze-chat-sdk-semi-button-with-icon-only');
      if (iconButtons.length > 7) {
        iconButtons[7].style.display = 'none';
      }

      // 3. 把中间提示改成“按住此处说话”
      Array.from(document.querySelectorAll('*')).forEach(el => {
        const txt = (el.textContent || '').trim();
        if (
          el.children.length === 0 &&
          (txt === 'Press here or the space key to speak' || txt === 'Click to activate input')
        ) {
          el.textContent = '按住此处说话';
          el.style.position = 'relative';
          el.style.top = '-3px';
          el.style.whiteSpace = 'nowrap';
        }
      });
    }

    // 初次渲染后多执行几次，防止 SDK 异步刷新
    setTimeout(applyVoiceOnlyUI, 1200);
    setTimeout(applyVoiceOnlyUI, 2500);
    setTimeout(applyVoiceOnlyUI, 4000);
    setTimeout(applyVoiceOnlyUI, 6000);

    // 持续监听 DOM 变化，保证切换后仍然是语音模式
    const observer = new MutationObserver(() => {
      applyVoiceOnlyUI();
    });

    observer.observe(document.body, {
      childList: true,
      subtree: true
    });
  </script>
</body>
</html>
