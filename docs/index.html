<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>护理差错告知AI助手</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --panel: #ffffff;
      --line: #dfe4ea;
      --text: #1f2933;
      --muted: #6b7280;
      --primary: #2563eb;
      --primary-soft: #dbeafe;
      --assistant: #eef2f7;
      --user: #dfe6ff;
      --danger: #b42318;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Microsoft YaHei", sans-serif;
    }

    body {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      place-items: stretch center;
      padding: 28px 16px;
    }

    button,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.58;
    }

    .app {
      width: min(100%, 760px);
      height: calc(100vh - 56px);
      min-height: 560px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 12px 36px rgba(15, 23, 42, 0.12);
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
      min-height: 70px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
    }

    .brand {
      display: flex;
      align-items: center;
      min-width: 0;
      gap: 12px;
      font-weight: 700;
      font-size: 20px;
    }

    .brand-mark {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: var(--primary);
      color: #fff;
      font-size: 18px;
      line-height: 1;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 7px 12px;
      border-radius: 999px;
      background: #111827;
      color: #fff;
      font-weight: 700;
      white-space: nowrap;
    }

    .pill.secondary {
      background: #374151;
      font-weight: 600;
    }

    .messages {
      overflow: auto;
      padding: 20px 18px 24px;
      background: linear-gradient(#fff, #f8fafc);
    }

    .message-row {
      display: flex;
      gap: 10px;
      margin: 0 0 18px;
      align-items: flex-start;
      width: 100%;
    }

    .message-row.user {
      justify-content: flex-end;
    }

    .avatar {
      width: 34px;
      height: 34px;
      flex: 0 0 34px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: #e5e7eb;
      color: #4b5563;
      font-weight: 700;
    }

    .assistant .avatar {
      background: #dbeafe;
      color: #1d4ed8;
    }

    .bubble {
      width: fit-content;
      max-width: min(640px, 84vw);
      padding: 13px 15px;
      border-radius: 8px;
      white-space: pre-wrap;
      line-height: 1.65;
      font-size: 16px;
      overflow-wrap: break-word;
      word-break: normal;
    }

    .assistant .bubble {
      background: var(--assistant);
    }

    .user .bubble {
      background: var(--user);
      max-width: min(520px, 70vw);
      margin-left: auto;
      word-break: keep-all;
      overflow-wrap: normal;
    }

    .bubble.force-break {
      word-break: break-word;
      overflow-wrap: anywhere;
    }

    .meta {
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
    }

    .composer {
      border-top: 1px solid var(--line);
      padding: 12px 16px 14px;
      background: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 7px;
    }

    .icon-btn {
      position: relative;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: #eef2f7;
      color: var(--primary);
      display: grid;
      place-items: center;
      box-shadow: 0 6px 18px rgba(37, 99, 235, 0.18);
      transition: transform 0.16s ease, background 0.16s ease, color 0.16s ease;
      touch-action: none;
      user-select: none;
    }

    .icon-btn::before {
      content: "🎙";
      font-size: 25px;
      line-height: 1;
    }

    .icon-btn:hover:not(:disabled) {
      transform: translateY(-1px);
      background: var(--primary);
      color: #fff;
    }

    .icon-btn.active {
      background: var(--danger);
      color: #fff;
      box-shadow: 0 8px 22px rgba(180, 35, 24, 0.22);
    }

    .icon-btn.active::after {
      content: "";
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 2px solid rgba(180, 35, 24, 0.28);
      animation: pulse-ring 1.3s ease-out infinite;
    }

    .voice-status {
      min-height: 18px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
      text-align: center;
      max-width: min(92%, 520px);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    @keyframes pulse-ring {
      0% {
        transform: scale(0.86);
        opacity: 0.9;
      }
      100% {
        transform: scale(1.28);
        opacity: 0;
      }
    }

    .send-btn {
      padding: 0 18px;
      background: var(--primary);
      color: #fff;
    }

    textarea {
      display: none;
      width: 100%;
      min-height: 44px;
      max-height: 132px;
      resize: none;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      line-height: 1.5;
      outline: none;
    }

    textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    .send-btn {
      display: none;
    }

    #timer-toast {
      position: fixed;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      display: none;
      max-width: min(92vw, 560px);
      padding: 10px 14px;
      border-radius: 8px;
      background: #fff7ed;
      border: 1px solid #fed7aa;
      color: #9a3412;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.12);
      line-height: 1.5;
    }

    #timeout-overlay {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(15, 23, 42, 0.45);
    }

    #timeout-box {
      width: min(100%, 820px);
      max-height: 86vh;
      overflow: auto;
      background: #fff;
      border-radius: 8px;
      padding: 22px;
      box-shadow: 0 24px 56px rgba(15, 23, 42, 0.2);
    }

    #timeout-box h2 {
      margin: 0 0 10px;
      font-size: 22px;
    }

    #timeout-box p {
      margin: 8px 0;
      line-height: 1.65;
    }

    #feedback-content {
      margin-top: 14px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #f8fafc;
      white-space: pre-wrap;
      line-height: 1.75;
    }

    .timeout-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    .timeout-actions button {
      min-height: 40px;
      padding: 0 14px;
      border-radius: 8px;
      background: #eef2f7;
    }

    .timeout-actions .primary {
      background: var(--primary);
      color: #fff;
    }

    @media (max-width: 640px) {
      body {
        padding: 0;
      }

      .app {
        width: 100%;
        height: 100vh;
        min-height: 100vh;
        border: 0;
        border-radius: 0;
      }

      .topbar {
        grid-template-columns: 1fr;
      }

      .status {
        justify-content: flex-start;
      }

      .bubble {
        max-width: 88vw;
      }

      .user .bubble {
        max-width: 78vw;
      }
    }
  </style>
</head>
<body>
  <div id="timer-toast"></div>

  <div id="timeout-overlay">
    <div id="timeout-box">
      <h2 id="overlay-title">提示</h2>
      <p id="overlay-text">内容加载中...</p>
      <div id="feedback-content">反馈内容加载中...</div>
      <p id="overlay-tip"></p>
      <div class="timeout-actions">
        <button id="restart-training">重新开始</button>
        <button id="stage-next" class="primary" style="display:none;">进入下一阶段</button>
        <button id="close-timeout" class="primary">我知道了</button>
      </div>
    </div>
  </div>

  <main class="app">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">AI</div>
        <div>护理差错告知AI助手</div>
      </div>
      <div class="status">
        <div id="stage-badge" class="pill secondary">当前阶段：未开始</div>
        <div id="training-timer" class="pill">60:00</div>
      </div>
    </header>

    <section id="messages" class="messages" aria-live="polite"></section>

    <form id="composer" class="composer">
      <button id="mic-btn" class="icon-btn" type="button" title="按住说话，松开发送" aria-label="按住语音输入"></button>
      <div id="voice-status" class="voice-status">按住麦克风开始说话，松开发送</div>
      <textarea id="message-input" rows="1" aria-hidden="true" tabindex="-1"></textarea>
      <button id="send-btn" class="send-btn" type="submit">发送</button>
    </form>
  </main>

  <audio id="assistant-audio" preload="auto"></audio>

  <script>
    // const BACKEND_BASE = 'http://localhost:3000';
    const BACKEND_BASE = 'https://chat-production-b4be.up.railway.app';
    const TEST_MODE = false;
    const TEST_STAGE_MINUTES = 5;
    const FORMAL_STAGE_MINUTES = 30;

    let localSessionId = '';
    let timerStarted = false;
    let timerInterval = null;
    let currentStage = 0;
    let totalSeconds = 0;
    let warnedStage1 = false;
    let warnedStage2 = false;
    let stage1Ended = false;
    let finalEnded = false;
    let stage1FeedbackLocked = false;
    let finalFeedbackLocked = false;
    let chatLog = [];
    let currentStageAtSend = 0;
    let sending = false;
    let recognition = null;
    let recognizing = false;
    let finalVoiceText = '';
    let recognitionHadError = false;
    let isPressingMic = false;
    let shouldSendVoiceOnEnd = false;
    let recognitionStartCanceled = false;

    const STAGE_MINUTES = TEST_MODE ? TEST_STAGE_MINUTES : FORMAL_STAGE_MINUTES;
    const TOTAL_SECONDS = STAGE_MINUTES * 60 * 2;
    const STAGE_SECONDS = STAGE_MINUTES * 60;
    const REMIND_SECONDS = Math.min(3 * 60, Math.max(60, Math.floor(STAGE_SECONDS * 0.2)));

    const messagesEl = document.getElementById('messages');
    const formEl = document.getElementById('composer');
    const inputEl = document.getElementById('message-input');
    const sendBtn = document.getElementById('send-btn');
    const micBtn = document.getElementById('mic-btn');
    const voiceStatusEl = document.getElementById('voice-status');
    const audioEl = document.getElementById('assistant-audio');
    const timerEl = () => document.getElementById('training-timer');
    const toastEl = () => document.getElementById('timer-toast');
    const overlayEl = () => document.getElementById('timeout-overlay');
    const stageBadgeEl = () => document.getElementById('stage-badge');
    const overlayTitleEl = () => document.getElementById('overlay-title');
    const overlayTextEl = () => document.getElementById('overlay-text');
    const overlayTipEl = () => document.getElementById('overlay-tip');
    const feedbackContentEl = () => document.getElementById('feedback-content');
    const stageNextBtn = () => document.getElementById('stage-next');
    const closeBtn = () => document.getElementById('close-timeout');

    totalSeconds = TOTAL_SECONDS;

    function formatTime(sec) {
      const m = Math.floor(sec / 60).toString().padStart(2, '0');
      const s = (sec % 60).toString().padStart(2, '0');
      return `${m}:${s}`;
    }

    function showToast(message, duration = 4200) {
      const el = toastEl();
      el.textContent = message;
      el.style.display = 'block';
      clearTimeout(el._timer);
      el._timer = setTimeout(() => {
        el.style.display = 'none';
      }, duration);
    }

    function updateTimerUI() {
      timerEl().textContent = formatTime(totalSeconds);
    }

    function updateStageUI() {
      if (!timerStarted) {
        stageBadgeEl().textContent = '当前阶段：未开始';
        return;
      }
      if (currentStage === 1) stageBadgeEl().textContent = '当前阶段：第一阶段（案例一）';
      else if (currentStage === 2) stageBadgeEl().textContent = '当前阶段：第二阶段（案例二）';
      else if (currentStage === 3) stageBadgeEl().textContent = '当前阶段：训练已结束';
    }

    function normalizeText(text) {
      return String(text || '')
        .replace(/\r/g, '')
        .replace(/\n{3,}/g, '\n\n')
        .trim();
    }

    function cleanForSpeechText(text) {
      return normalizeText(text)
        .replace(/<think>[\s\S]*?<\/think>/gi, '')
        .replace(/<thinking>[\s\S]*?<\/thinking>/gi, '')
        .replace(/Powered by coze.*$/i, '')
        .replace(/\\[rnt]/g, ' ')
        .replace(/\\"/g, '"')
        .replace(/\\\\/g, '')
        .replace(/[\\_]+/g, '')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function cleanForDisplayText(text) {
      return normalizeText(text)
        .replace(/<think>[\s\S]*?<\/think>/gi, '')
        .replace(/<thinking>[\s\S]*?<\/thinking>/gi, '')
        .replace(/Powered by coze.*$/i, '')
        .replace(/\\r\\n/g, '\n')
        .replace(/\\n/g, '\n')
        .replace(/\\r/g, '\n')
        .replace(/\\t/g, '  ')
        .replace(/\\"/g, '"')
        .replace(/\n{3,}/g, '\n\n')
        .trim();
    }

    function pushChatLog(role, content, stage) {
      const text = normalizeText(content);
      if (!text) return;
      chatLog.push({ role, content: text, stage, ts: Date.now() });
    }

    function getStageTranscript(stage) {
      return chatLog
        .filter(item => item.stage === stage && item.content)
        .map(item => `${item.role === 'user' ? '学员' : '患者/系统'}：${item.content}`)
        .join('\n');
    }

    function getAllTranscript() {
      return chatLog
        .filter(item => item.content)
        .map(item => `${item.role === 'user' ? '学员' : '患者/系统'}：${item.content}`)
        .join('\n');
    }

    async function postJson(path, body) {
      let res;
      try {
        res = await fetch(`${BACKEND_BASE}${path}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body || {})
        });
      } catch (fetchErr) {
        throw new Error(`后端服务暂时不可达，请检查 Railway 后端是否已启动：${BACKEND_BASE}`);
      }

      const data = await res.json().catch(() => ({}));
      if (!res.ok || !data.ok) {
        const err = new Error(data.error || `请求失败: ${path}`);
        err.status = res.status;
        err.data = data;
        throw err;
      }
      return data;
    }

    function appendMessage(role, content, meta = '') {
      const row = document.createElement('div');
      row.className = `message-row ${role}`;

      if (role === 'assistant') {
        const avatar = document.createElement('div');
        avatar.className = 'avatar';
        avatar.textContent = 'AI';
        row.appendChild(avatar);
      }

      const wrap = document.createElement('div');
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      if (/[A-Za-z0-9_:/.-]{28,}/.test(content)) {
        bubble.classList.add('force-break');
      }
      bubble.textContent = content;
      wrap.appendChild(bubble);

      if (meta) {
        const metaEl = document.createElement('div');
        metaEl.className = 'meta';
        metaEl.textContent = meta;
        wrap.appendChild(metaEl);
      }

      row.appendChild(wrap);
      messagesEl.appendChild(row);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return row;
    }

    function appendTyping() {
      return appendMessage('assistant', '正在回复...', '请稍候');
    }

    function removeNode(node) {
      if (node && node.parentElement) node.parentElement.removeChild(node);
    }

    function setSending(value) {
      sending = value;
      micBtn.disabled = value;
      if (!recognizing && voiceStatusEl) {
        voiceStatusEl.textContent = value ? '正在等待助手回复...' : '按住麦克风开始说话，松开发送';
      }
    }

    function isStartTrainingMessage(content) {
      const text = normalizeText(content).replace(/[。.!！\s]/g, '');
      return text === '开始训练';
    }

    async function createTrainingSession() {
      const data = await postJson('/api/session/new', {});
      localSessionId = data.localSessionId;
    }

    async function markTrainingStarted() {
      if (!localSessionId) return;
      try {
        await postJson('/api/session/start', { localSessionId });
      } catch (err) {
        if (!isMissingSessionError(err)) throw err;
        await createTrainingSession();
        await postJson('/api/session/start', { localSessionId });
      }
    }

    function startTimer() {
      if (timerStarted) return;
      timerStarted = true;
      currentStage = 1;
      updateTimerUI();
      updateStageUI();
      timerInterval = setInterval(tick, 1000);
    }

    function stopTimer() {
      if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
      }
    }

    function playAssistantAudio(audioUrl) {
      if (!audioUrl) return;
      audioEl.src = audioUrl.startsWith('http') ? audioUrl : `${BACKEND_BASE}${audioUrl}`;
      audioEl.play().catch(() => {
        showToast('浏览器阻止了自动播放，请点击页面后继续训练。');
      });
    }

    function isMissingSessionError(err) {
      return err?.status === 404 && /session not found/i.test(err.message || '');
    }

    function resetLocalTrainingState() {
      chatLog = [];
      currentStage = 0;
      currentStageAtSend = 0;
      timerStarted = false;
      totalSeconds = TOTAL_SECONDS;
      stage1Ended = false;
      finalEnded = false;
      stage1FeedbackLocked = false;
      finalFeedbackLocked = false;
      warnedStage1 = false;
      warnedStage2 = false;
      stopTimer();
      updateTimerUI();
      updateStageUI();
    }

    async function sendChatToBackend(text) {
      try {
        return await postJson('/api/chat/send', {
          localSessionId,
          content: text
        });
      } catch (err) {
        if (!isMissingSessionError(err)) throw err;
        await createTrainingSession();
        resetLocalTrainingState();
        showToast('检测到后端已重启，已自动开启一轮新会话。');
        return postJson('/api/chat/send', {
          localSessionId,
          content: text
        });
      }
    }

    async function sendMessage(content) {
      const text = normalizeText(content);
      if (!text || sending) return;

      currentStageAtSend = currentStage || 1;
      appendMessage('user', text);
      pushChatLog('user', text, currentStageAtSend);
      inputEl.value = '';
      autoResizeInput();
      setSending(true);

      const typing = appendTyping();
      try {
        const data = await sendChatToBackend(text);

        if (isStartTrainingMessage(text) && !timerStarted) {
          await markTrainingStarted();
          startTimer();
          showToast(`训练已开始：当前为${TEST_MODE ? '5分钟/阶段测试模式' : '30分钟/阶段正式模式'}。`);
        }

        const answer = cleanForDisplayText(data.answer || '暂无回复');
        removeNode(typing);
        appendMessage('assistant', answer);
        pushChatLog('assistant', answer, currentStageAtSend);
        playAssistantAudio(data.audioUrl);
      } catch (err) {
        removeNode(typing);
        appendMessage('assistant', `请求失败：${err.message}`);
      } finally {
        setSending(false);
        inputEl.focus();
      }
    }

    function openOverlay({ title, text, tip, feedback = '', showNext = false, showRestart = true }) {
      overlayTitleEl().textContent = title;
      overlayTextEl().textContent = text;
      overlayTipEl().textContent = tip || '';
      feedbackContentEl().textContent = feedback || '暂无反馈内容';
      stageNextBtn().style.display = showNext ? 'inline-block' : 'none';
      closeBtn().style.display = showNext ? 'none' : 'inline-block';
      document.getElementById('restart-training').style.display = showRestart ? 'inline-block' : 'none';
      overlayEl().style.display = 'flex';
    }

    function closeOverlay() {
      overlayEl().style.display = 'none';
    }

    function getCurrentStageRemaining() {
      if (currentStage === 1) return totalSeconds - STAGE_SECONDS;
      if (currentStage === 2) return totalSeconds;
      return 0;
    }

    async function handleStage1End() {
      if (stage1FeedbackLocked) return;
      stage1FeedbackLocked = true;
      stage1Ended = true;
      stopTimer();
      showToast('第一阶段已到时，正在生成反馈。');

      try {
        const data = await postJson('/api/session/stage1-timeup', {
          localSessionId,
          transcript: getStageTranscript(1)
        });
        currentStage = 2;
        openOverlay({
          title: '第一阶段反馈',
          text: '第一阶段已结束。关闭后请输入“进入第二阶段”，继续案例二训练。',
          tip: '点击进入下一阶段后，计时会继续。',
          feedback: data.answer || '未获取到反馈文本',
          showNext: true
        });
      } catch (err) {
        openOverlay({
          title: '第一阶段反馈失败',
          text: '后端没有成功生成第一阶段反馈。',
          tip: err.message,
          feedback: err.stack || err.message,
          showNext: true
        });
      }
    }

    async function handleFinalEnd() {
      if (finalFeedbackLocked) return;
      finalFeedbackLocked = true;
      finalEnded = true;
      currentStage = 3;
      stopTimer();
      totalSeconds = 0;
      updateTimerUI();
      updateStageUI();
      showToast('训练已结束，正在生成最终反馈。');

      try {
        const data = await postJson('/api/session/final-timeup', {
          localSessionId,
          transcript: getStageTranscript(2)
        });
        openOverlay({
          title: '训练结束反馈',
          text: '本次训练已结束，系统已生成最终反馈报告。',
          feedback: data.answer || '未获取到反馈文本',
          showNext: false
        });
      } catch (err) {
        openOverlay({
          title: '最终反馈失败',
          text: '后端没有成功生成最终反馈。',
          tip: err.message,
          feedback: err.stack || err.message,
          showNext: false
        });
      }
    }

    function tick() {
      totalSeconds -= 1;
      if (totalSeconds < 0) totalSeconds = 0;

      if (totalSeconds > STAGE_SECONDS) currentStage = 1;
      else if (totalSeconds > 0) currentStage = 2;
      else currentStage = 3;

      const stageRemaining = getCurrentStageRemaining();
      if (currentStage === 1 && stageRemaining <= REMIND_SECONDS && !warnedStage1) {
        warnedStage1 = true;
        showToast(`第一阶段还剩 ${Math.ceil(REMIND_SECONDS / 60)} 分钟，请准备结束当前轮对话。`);
      }
      if (currentStage === 2 && stageRemaining <= REMIND_SECONDS && !warnedStage2) {
        warnedStage2 = true;
        showToast(`第二阶段还剩 ${Math.ceil(REMIND_SECONDS / 60)} 分钟，请准备结束当前轮对话。`);
      }

      updateTimerUI();
      updateStageUI();

      if (!stage1Ended && totalSeconds === STAGE_SECONDS) {
        handleStage1End();
        return;
      }
      if (!finalEnded && totalSeconds === 0) {
        handleFinalEnd();
      }
    }

    function autoResizeInput() {
      inputEl.style.height = 'auto';
      inputEl.style.height = `${Math.min(inputEl.scrollHeight, 132)}px`;
    }

    async function ensureMicrophonePermission() {
      if (!navigator.mediaDevices?.getUserMedia) {
        throw new Error('当前浏览器不支持麦克风采集，请使用最新版 Edge 或 Chrome。');
      }

      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        stream.getTracks().forEach(track => track.stop());
      } catch (err) {
        if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
          throw new Error('麦克风权限被拒绝。请点击地址栏左侧的权限图标，允许此网站使用麦克风，然后刷新页面。');
        }
        if (err.name === 'NotFoundError' || err.name === 'DevicesNotFoundError') {
          throw new Error('没有检测到可用麦克风，请检查设备连接。');
        }
        if (err.name === 'NotReadableError' || err.name === 'TrackStartError') {
          throw new Error('麦克风正被其他程序占用，请关闭占用麦克风的软件后重试。');
        }
        if (err.name === 'SecurityError') {
          throw new Error('当前页面不允许访问麦克风，请用 http://127.0.0.1 或 HTTPS 打开页面。');
        }
        throw new Error(`麦克风初始化失败：${err.message || err.name || '未知错误'}`);
      }
    }

    function getSpeechRecognitionErrorMessage(error) {
      const map = {
        'not-allowed': '语音识别权限被拒绝。请在地址栏权限设置中允许麦克风，并确认 Windows 设置允许浏览器访问麦克风。',
        'service-not-allowed': '浏览器语音识别服务不可用，请确认网络可用，或换用最新版 Edge/Chrome。',
        'audio-capture': '未能采集到麦克风声音，请检查麦克风设备和系统权限。',
        'network': '语音识别网络服务连接失败，请检查网络后重试。',
        'no-speech': '没有检测到说话声音，请靠近麦克风后再试一次。',
        'aborted': '语音输入已取消。',
        'language-not-supported': '当前浏览器不支持中文语音识别。'
      };
      return map[error] || `语音输入失败：${error || '未知错误'}`;
    }

    function setupSpeechRecognition() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) {
        micBtn.disabled = true;
        micBtn.title = '当前浏览器不支持语音输入';
        voiceStatusEl.textContent = '当前浏览器不支持语音输入';
        return;
      }

      recognition = new SpeechRecognition();
      recognition.lang = 'zh-CN';
      recognition.interimResults = true;
      recognition.continuous = true;

      recognition.onstart = () => {
        recognizing = true;
        recognitionHadError = false;
        finalVoiceText = '';
        recognitionStartCanceled = false;
        micBtn.classList.add('active');
        micBtn.setAttribute('aria-label', '松开发送语音');
        voiceStatusEl.textContent = '正在聆听，松开发送';
      };
      recognition.onend = async () => {
        recognizing = false;
        micBtn.classList.remove('active');
        micBtn.setAttribute('aria-label', '按住语音输入');
        voiceStatusEl.textContent = sending ? '正在等待助手回复...' : '按住麦克风开始说话，松开发送';
        const text = normalizeText(finalVoiceText || inputEl.value);
        finalVoiceText = '';
        inputEl.value = '';
        const shouldSend = shouldSendVoiceOnEnd;
        shouldSendVoiceOnEnd = false;
        if (!recognitionHadError && shouldSend && text && !sending) {
          await sendMessage(text);
        } else if (!recognitionHadError && shouldSend && !text && !sending) {
          showToast('没有识别到语音，请再试一次。');
        }
      };
      recognition.onerror = event => {
        recognitionHadError = true;
        const message = getSpeechRecognitionErrorMessage(event.error);
        isPressingMic = false;
        shouldSendVoiceOnEnd = false;
        voiceStatusEl.textContent = '按住麦克风开始说话，松开发送';
        showToast(message, 7000);
      };
      recognition.onresult = event => {
        let interimText = '';
        for (let i = event.resultIndex; i < event.results.length; i++) {
          const transcript = event.results[i][0].transcript;
          if (event.results[i].isFinal) {
            finalVoiceText += transcript;
          } else {
            interimText += transcript;
          }
        }
        const preview = normalizeText(finalVoiceText || interimText);
        inputEl.value = preview;
        if (preview) {
          voiceStatusEl.textContent = `识别中：${preview}`;
        }
      };
    }

    async function startPressToTalk(event) {
      event.preventDefault();
      if (!recognition || sending || recognizing || isPressingMic) return;

      isPressingMic = true;
      shouldSendVoiceOnEnd = false;
      recognitionStartCanceled = false;
      finalVoiceText = '';
      inputEl.value = '';

      if (event.pointerId !== undefined && micBtn.setPointerCapture) {
        try {
          micBtn.setPointerCapture(event.pointerId);
        } catch (err) {
        }
      }

      try {
        voiceStatusEl.textContent = '正在请求麦克风权限...';
        await ensureMicrophonePermission();
        if (!isPressingMic) {
          recognitionStartCanceled = true;
          voiceStatusEl.textContent = '按住麦克风开始说话，松开发送';
          return;
        }
        recognition.start();
      } catch (err) {
        isPressingMic = false;
        shouldSendVoiceOnEnd = false;
        voiceStatusEl.textContent = '按住麦克风开始说话，松开发送';
        showToast(err.message, 8000);
      }
    }

    function finishPressToTalk(event) {
      event.preventDefault();
      if (!recognition || sending) return;
      if (event.pointerId !== undefined && micBtn.releasePointerCapture) {
        try {
          micBtn.releasePointerCapture(event.pointerId);
        } catch (err) {
        }
      }

      isPressingMic = false;
      shouldSendVoiceOnEnd = true;
      if (recognizing) {
        voiceStatusEl.textContent = '正在发送语音...';
        recognition.stop();
      } else if (recognitionStartCanceled) {
        shouldSendVoiceOnEnd = false;
        recognitionStartCanceled = false;
        voiceStatusEl.textContent = '按住麦克风开始说话，松开发送';
      }
    }

    formEl.addEventListener('submit', event => {
      event.preventDefault();
    });

    micBtn.addEventListener('pointerdown', startPressToTalk);
    micBtn.addEventListener('pointerup', finishPressToTalk);
    micBtn.addEventListener('pointercancel', finishPressToTalk);
    micBtn.addEventListener('pointerleave', event => {
      if (isPressingMic) finishPressToTalk(event);
    });
    micBtn.addEventListener('touchstart', startPressToTalk, { passive: false });
    micBtn.addEventListener('touchend', finishPressToTalk, { passive: false });
    micBtn.addEventListener('touchcancel', finishPressToTalk, { passive: false });
    micBtn.addEventListener('contextmenu', event => event.preventDefault());

    document.getElementById('close-timeout').addEventListener('click', closeOverlay);
    document.getElementById('stage-next').addEventListener('click', () => {
      closeOverlay();
      currentStage = 2;
      updateStageUI();
      if (!finalEnded && !timerInterval && totalSeconds > 0) {
        timerInterval = setInterval(tick, 1000);
      }
      showToast('已进入第二阶段。请在对话中输入“进入第二阶段”，然后继续训练。');
    });
    document.getElementById('restart-training').addEventListener('click', async () => {
      try {
        if (localSessionId) await postJson('/api/session/reset', { localSessionId });
      } catch (err) {
      }
      location.reload();
    });

    async function bootstrap() {
      updateTimerUI();
      updateStageUI();
      setupSpeechRecognition();
      setSending(true);
      try {
        await createTrainingSession();
        appendMessage(
          'assistant',
          '您好！我是护理差错告知训练小助手。请问是否开始训练？如果是，请回复“开始训练”。'
        );
      } catch (err) {
        appendMessage('assistant', `创建新会话失败：${err.message}`);
      } finally {
        setSending(false);
        inputEl.focus();
      }
    }

    bootstrap();
  </script>
</body>
</html>
